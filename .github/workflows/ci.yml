name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Setup Node
      uses: actions/setup-node@v3
      with:
        node-version: 18

    - name: Install deps
      run: npm install

    - name: Lint
      run: npm run lint || echo "No linter configured"

    - name: Run Tests
      run: npm test || echo "No tests configured"

    - name: Build Docker Image
      run: docker build -t thryl-backend .
